<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargar Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/estilos.css">
</head>
<body class="bg-dark text-light p-5 d-flex align-items-center justify-content-center vh-100">
    <div class="container bg-secondary p-5 rounded-4 shadow-lg" style="max-width: 600px;">
        <h2 class="text-center fw-bold mb-4">Publicar Nueva Noticia</h2>
        <form action="/nueva-noticia" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Título de la noticia:</label>
                <input type="text" name="titulo" class="form-control bg-dark text-light border-0 shadow-sm" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Contenido:</label>
                <textarea name="contenido" class="form-control bg-dark text-light border-0 shadow-sm" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">Enviar Noticia</button>
            <div class="text-center mt-4">
                <a href="/index.html" class="text-light text-decoration-none small">← Volver al Inicio</a>
            </div>
        </form>
    </div>
</body>
</html>
